version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: itsm-postgres
    restart: always
    environment:
      POSTGRES_USER: itsm_user
      POSTGRES_PASSWORD: itsm_password
      POSTGRES_DB: itsm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: itsm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: itsm-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: itsm-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
