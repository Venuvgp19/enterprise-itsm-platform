name: Enterprise ITSM Platform CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: itsm_user
          POSTGRES_PASSWORD: itsm_password
          POSTGRES_DB: itsm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://itsm_user:itsm_password@localhost:5432/itsm_db?schema=public"

      - name: Run Backend Tests
        run: npm run test

      - name: Build Backend & Frontend Production Bundles
        run: |
          npm run build:db
          npm run build:backend
          npm run build:frontend
